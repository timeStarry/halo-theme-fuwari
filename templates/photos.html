<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(title = |#{page.photos.title} - ${site.title}|, hero = null, content = ~{::content}, head = null, footer = null, sidebar = null, contentClass = null, pageType = 'photos')}"
>
  <th:block th:fragment="content">
    <div class="flex w-full flex-col gap-4">
      <div class="card-base overflow-hidden px-9 py-8">
        <div class="mb-2 flex flex-wrap items-center gap-3">
          <div
            th:if="${not #strings.isEmpty(theme.config.photos.page_title)}"
            class="text-3xl font-bold text-black/85 transition dark:text-white/85"
            th:text="${theme.config.photos.page_title}"
          ></div>
          <div
            th:unless="${not #strings.isEmpty(theme.config.photos.page_title)}"
            class="text-3xl font-bold text-black/85 transition dark:text-white/85"
            th:text="#{page.photos.title}"
          ></div>
          <div
            th:if="${pluginFinder.available('PluginPhotos') and not #strings.isEmpty(param.group)}"
            class="inline-flex rounded-full bg-[var(--btn-regular-bg)] px-3 py-1 text-xs font-medium text-[var(--btn-content)]"
          >
            <th:block th:each="group : ${photoFinder.groupBy()}">
              <span th:if="${#strings.equals(group.metadata.name, param.group)}" th:text="${group.spec.displayName}"></span>
            </th:block>
          </div>
        </div>
        <div
          th:if="${not #strings.isEmpty(theme.config.photos.page_subtitle)}"
          class="text-sm leading-6 text-black/45 transition dark:text-white/45"
          th:text="${theme.config.photos.page_subtitle}"
        ></div>
        <th:block th:if="${pluginFinder.available('PluginPhotos') and not #strings.isEmpty(param.group)}">
          <th:block th:each="group : ${photoFinder.groupBy()}">
            <div
              th:if="${#strings.equals(group.metadata.name, param.group) and not #strings.isEmpty(#annotations.get(group, 'description'))}"
              class="mt-3 text-sm leading-6 text-black/45 transition dark:text-white/45"
              th:text="${#annotations.get(group, 'description')}"
            ></div>
          </th:block>
        </th:block>
      </div>

      <div class="card-base px-8 py-6" th:unless="${pluginFinder.available('PluginPhotos')}">
        <th:block
          th:replace="~{modules/plugin-empty-state :: state(
            icon='icon-[material-symbols--imagesmode-outline-rounded]',
            title=#{page.empty.photosPlugin},
            description=#{page.empty.photosPlugin.tip},
            installUrl='https://www.halo.run/store/apps/app-BmQJW',
            compact=${false}
          )}"
        />
      </div>

      <th:block th:if="${pluginFinder.available('PluginPhotos')}">
        <div class="card-base px-8 py-6" th:if="${#lists.isEmpty(photos.items)}">
          <th:block
            th:replace="~{modules/plugin-empty-state :: state(
              icon='icon-[material-symbols--imagesmode-outline-rounded]',
              title=#{page.empty.noPhotos},
              description=#{page.empty.noPhotos.tip},
              installUrl=${null},
              compact=${false}
            )}"
          />
        </div>

        <div class="card-base px-8 py-6" th:unless="${#lists.isEmpty(photos.items)}">
          <div id="photos-gallery" class="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-3">
            <th:block th:each="photo : ${photos.items}">
              <figure class="group overflow-hidden rounded-[var(--radius-large)] border border-dashed border-[var(--line-divider)] bg-black/[0.015] transition dark:bg-white/[0.02]">
                <img
                  th:src="${photo.spec.url}"
                  th:alt="${photo.spec.description}"
                  th:title="${photo.spec.description}"
                  class="h-64 w-full cursor-zoom-in object-cover transition duration-500 group-hover:scale-[1.03]"
                />
                <figcaption class="flex items-start justify-between gap-3 p-4">
                  <div class="min-w-0">
                    <div class="line-clamp-1 font-semibold text-black/80 transition dark:text-white/80" th:text="${photo.spec.displayName}"></div>
                    <div class="mt-1 line-clamp-2 text-sm leading-6 text-black/45 transition dark:text-white/45" th:text="${photo.spec.description}"></div>
                  </div>
                  <span class="icon-[material-symbols--zoom-in-rounded] shrink-0 text-xl text-black/25 transition group-hover:text-[var(--primary)] dark:text-white/25"></span>
                </figcaption>
              </figure>
            </th:block>
          </div>
        </div>
      </th:block>
    </div>
  </th:block>
</html>
