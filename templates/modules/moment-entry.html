<th:block th:fragment="entry(moment, detailView)">
  <th:block
    th:with="content=${moment.spec.content}, momentName=${moment.metadata.name}, detailUrl=@{|/moments/${moment.metadata.name}|}"
  >
    <div
      class="card-base overflow-hidden px-8 py-6"
      th:attr="x-data=|momentInteractions('${momentName}')|"
      x-init="init()"
    >
      <div class="mb-4 flex flex-wrap items-start justify-between gap-4">
        <div class="flex items-center gap-3 text-sm text-black/35 transition dark:text-white/35">
          <div
            class="flex h-10 w-10 items-center justify-center rounded-2xl bg-[var(--btn-regular-bg)] text-[var(--primary)]"
          >
            <span class="icon-[material-symbols--ink-pen-outline-rounded] text-[1.2rem]"></span>
          </div>
          <div class="space-y-1">
            <div class="flex items-center gap-2">
              <span class="icon-[material-symbols--schedule-outline-rounded] text-base"></span>
              <time th:text="${#dates.format(moment.spec.releaseTime,'yyyy-MM-dd HH:mm')}"></time>
            </div>
          </div>
        </div>

        <a
          th:unless="${detailView}"
          th:href="${detailUrl}"
          class="moment-detail-link btn-regular h-9 rounded-full px-4 text-sm font-semibold shadow-sm active:scale-95"
        >
          <span th:text="#{page.moments.viewDetail}"></span>
          <span class="icon-[material-symbols--arrow-outward-rounded] text-base"></span>
        </a>
      </div>

      <div
        th:if="${not #strings.isEmpty(content.html)}"
        class="custom-md prose prose-base !max-w-none dark:prose-invert"
        th:utext="${content.html}"
      ></div>
      <div
        th:unless="${not #strings.isEmpty(content.html)}"
        class="whitespace-pre-wrap leading-7 text-black/75 transition dark:text-white/75"
        th:text="${content.raw}"
      ></div>

      <th:block th:if="${not #lists.isEmpty(content.medium)}">
        <div
          class="moment-gallery mt-5 grid grid-cols-2 gap-3 md:grid-cols-3"
          th:if="${#strings.contains(content.medium,'PHOTO')}"
        >
          <th:block th:each="momentItem : ${content.medium}">
            <img
              th:if="${momentItem.type.name == 'PHOTO'}"
              th:src="${momentItem.url}"
              th:alt="${moment.spec.releaseTime}"
              class="h-40 w-full cursor-zoom-in rounded-2xl object-cover transition hover:opacity-90"
            />
          </th:block>
        </div>
        <div class="mt-5 flex flex-col gap-3" th:each="momentItem : ${content.medium}">
          <video
            th:if="${momentItem.type.name == 'VIDEO'}"
            th:src="${momentItem.url}"
            controls
            class="w-full rounded-2xl bg-black"
          ></video>
        </div>
      </th:block>

      <div class="mt-6 flex flex-wrap items-center gap-2 border-t border-dashed border-[var(--line-divider)] pt-4">
        <button
          type="button"
          class="moment-action-btn"
          x-on:click="handleUpvote()"
          x-bind:class="upvoted ? 'moment-action-btn-active' : ''"
          th:aria-label="#{page.moments.like}"
        >
          <span class="icon-[material-symbols--favorite-rounded] text-[1.05rem]"></span>
          <span x-text="upvoteCount">0</span>
        </button>

        <a th:href="|${detailUrl}#comment|" class="moment-action-btn" th:aria-label="#{common.comment}">
          <span class="icon-[material-symbols--chat-bubble-outline-rounded] text-[1.05rem]"></span>
          <span x-text="commentCount">0</span>
        </a>

        <a th:if="${detailView}" href="/moments" class="moment-action-btn" th:aria-label="#{page.moments.backToList}">
          <span class="icon-[material-symbols--arrow-back-rounded] text-[1.05rem]"></span>
          <span th:text="#{page.moments.backToList}"></span>
        </a>
      </div>
    </div>
  </th:block>
</th:block>
