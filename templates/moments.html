<!doctype html>
<html
  xmlns:th="https://www.thymeleaf.org"
  th:replace="~{modules/layout :: html(title = |#{page.moments.title} - ${site.title}|, hero = null, content = ~{::content}, head = null, footer = null, sidebar = null, contentClass = null, pageType = 'moments')}"
>
  <th:block th:fragment="content">
    <div class="flex w-full flex-col gap-4">
      <div class="card-base overflow-hidden px-9 py-8">
        <div
          th:if="${not #strings.isEmpty(theme.config.moments.page_title)}"
          class="mb-2 text-3xl font-bold text-black/85 transition dark:text-white/85"
          th:text="${theme.config.moments.page_title}"
        ></div>
        <div
          th:unless="${not #strings.isEmpty(theme.config.moments.page_title)}"
          class="mb-2 text-3xl font-bold text-black/85 transition dark:text-white/85"
          th:text="#{page.moments.title}"
        ></div>
        <div
          th:if="${not #strings.isEmpty(theme.config.moments.page_subtitle)}"
          class="text-sm leading-6 text-black/45 transition dark:text-white/45"
          th:text="${theme.config.moments.page_subtitle}"
        ></div>
      </div>

      <div class="card-base px-8 py-6" th:unless="${pluginFinder.available('PluginMoments')}">
        <th:block
          th:replace="~{modules/plugin-empty-state :: state(
            icon='icon-[material-symbols--ink-pen-outline-rounded]',
            title=#{page.empty.momentsPlugin},
            description=#{page.empty.momentsPlugin.tip},
            installUrl='https://www.halo.run/store/apps/app-SnwWD',
            compact=${false}
          )}"
        />
      </div>

      <th:block th:if="${pluginFinder.available('PluginMoments')}">
        <div class="card-base px-8 py-6" th:if="${#lists.isEmpty(moments.items)}">
          <th:block
            th:replace="~{modules/plugin-empty-state :: state(
              icon='icon-[material-symbols--ink-pen-outline-rounded]',
              title=#{page.empty.noMoments},
              description=#{page.empty.noMoments.tip},
              installUrl=${null},
              compact=${false}
            )}"
          />
        </div>

        <div class="flex flex-col gap-4" th:unless="${#lists.isEmpty(moments.items)}">
          <th:block th:each="moment : ${moments.items}" th:with="content=${moment.spec.content}">
            <div class="card-base overflow-hidden px-8 py-6">
              <div class="mb-4 flex items-center gap-3 text-sm text-black/35 transition dark:text-white/35">
                <div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-[var(--btn-regular-bg)] text-[var(--primary)]">
                  <span class="icon-[material-symbols--ink-pen-outline-rounded] text-[1.2rem]"></span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="icon-[material-symbols--schedule-outline-rounded] text-base"></span>
                  <time th:text="${#dates.format(moment.spec.releaseTime,'yyyy-MM-dd HH:mm')}"></time>
                </div>
              </div>

              <div
                th:if="${not #strings.isEmpty(content.html)}"
                class="custom-md prose prose-base !max-w-none dark:prose-invert"
                th:utext="${content.html}"
              ></div>
              <div
                th:unless="${not #strings.isEmpty(content.html)}"
                class="whitespace-pre-wrap leading-7 text-black/75 transition dark:text-white/75"
                th:text="${content.raw}"
              ></div>

              <th:block th:if="${not #lists.isEmpty(content.medium)}">
                <div class="moment-gallery mt-5 grid grid-cols-2 gap-3 md:grid-cols-3" th:if="${#strings.contains(content.medium,'PHOTO')}">
                  <th:block th:each="momentItem : ${content.medium}">
                    <img
                      th:if="${momentItem.type.name == 'PHOTO'}"
                      th:src="${momentItem.url}"
                      th:alt="${moment.spec.releaseTime}"
                      class="h-40 w-full cursor-zoom-in rounded-2xl object-cover transition hover:opacity-90"
                    />
                  </th:block>
                </div>
                <div class="mt-5 flex flex-col gap-3" th:each="momentItem : ${content.medium}">
                  <video
                    th:if="${momentItem.type.name == 'VIDEO'}"
                    th:src="${momentItem.url}"
                    controls
                    class="w-full rounded-2xl bg-black"
                  ></video>
                </div>
              </th:block>
            </div>
          </th:block>
        </div>
      </th:block>
    </div>
  </th:block>
</html>
